name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  model-guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile sources
        run: python -m py_compile config.py main.py chat/engine.py
      - name: Model-resolution regression tests
        run: python test_model_resolution.py
      - name: Resilience regression tests
        run: python test_resilience.py
      - name: Session-store tests
        run: python test_sessions.py
